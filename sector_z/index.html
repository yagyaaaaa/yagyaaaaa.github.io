<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SECTOR_Z | CLASSIFIED</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #000;
            margin: 0;
            height: 100vh;
            overflow: hidden;
            color: #ff0055;
            font-family: 'Orbitron', sans-serif;
            display: flex;
            flex-direction: column;
        }

        /* --- THE HEADER --- */
        .top-bar {
            height: 60px;
            border-bottom: 2px solid #ff0055;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            background: #050505;
            z-index: 10;
        }

        .status { font-size: 0.8rem; letter-spacing: 2px; }
        .blink { animation: blink 1s infinite; }

        /* --- THE PORTAL (Drive Embed) --- */
        .drive-frame {
            flex-grow: 1;
            width: 100%;
            border: none;
            /* DARK MODE HACK: Inverts colors of the white Google UI */
            filter: invert(1) hue-rotate(180deg) contrast(0.8);
        }

        /* --- OVERLAY (To fix color issues if needed) --- */
        .scanlines {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(to bottom, transparent 0px, transparent 2px, rgba(0,0,0,0.5) 3px);
            pointer-events: none;
            z-index: 20;
        }

        /* --- SECURITY CHECK --- */
        #auth-gate {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        
        .auth-input {
            background: #111; border: 2px solid #ff0055; color: #ff0055;
            padding: 15px; font-family: inherit; font-size: 1.2rem;
            margin-top: 20px; outline: none; text-align: center;
            width: 250px;
        }

        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div class="scanlines"></div>

    <!-- 1. SECURITY GATE (Simple Client-Side Lock) -->
    <div id="auth-gate">
        <h1 style="color: #ff0055; text-shadow: 0 0 10px #ff0000;">EYES ONLY</h1>
        <p>BIOMETRIC SCAN REQUIRED</p>
        <input type="password" id="pass-input" class="auth-input" placeholder="ENTER KEY">
        <p id="error-msg" style="color: red; display: none; margin-top: 10px;">ACCESS DENIED</p>
    </div>

    <!-- 2. THE CONTENT -->
    <div class="top-bar">
        <div>SECTOR_Z // <span class="blink">LIVE CONNECTION</span></div>
        <a href="/" style="color: #ff0055; text-decoration: none; border: 1px solid #ff0055; padding: 5px 10px;">EXIT</a>
    </div>

    
    <iframe src="https://drive.google.com/embeddedfolderview?id=1LcwTxF5G4a3aZJh5UqTWjDjbV_uOdBFk#grid" class="drive-frame"></iframe>

    <script>
        const gate = document.getElementById('auth-gate');
        const input = document.getElementById('pass-input');
        
        // AUTO-FOCUS
        input.focus();

        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
               
                if (input.value === "TellOpen1") {
                    gate.style.display = 'none';
                } else {
                    document.getElementById('error-msg').style.display = 'block';
                    input.value = '';
                }
            }
        });
    </script>
</body>
</html>
